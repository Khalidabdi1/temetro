name: Build & Release Electron App (Linux All Formats)

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install build tools for RPM and Arch
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm zstd

      - name: Clean electron-builder cache
        run: rm -rf ~/.cache/electron-builder

      - name: Build and Publish Electron App
        run: npx electron-builder --linux AppImage deb rpm tar.zst --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: List release folder
        run: ls -lh dist